# k8s/mongo-deployment.yaml

apiVersion: apps/v1
kind: Deployment

metadata:
  name: mongo-deployment

spec:
  replicas: 1

  selector:
    matchLabels:
      app: mongo

  template:
    metadata:
      labels:
        app: mongo

    spec:
      containers:
        - name: mongo

          image: mongo:6.0

          ports:
            - containerPort: 27017

          env:
            - name: MONGO_INITDB_ROOT_USERNAME
              valueFrom:
                secretKeyRef:
                  name: mongo-secret
                  key: mongo-username

            - name: MONGO_INITDB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mongo-secret
                  key: mongo-password

          volumeMounts:
            - name: mongo-storage
              mountPath: /data/db

      volumes:
        - name: mongo-storage
          persistentVolumeClaim:
            claimName: mongo-pvc

---
# k8s/mongo-service.yaml

apiVersion: v1
kind: Service

metadata:
  name: mongo-service

spec:
  selector:
    app: mongo

  ports:
    - port: 27017
      targetPort: 27017

  type: ClusterIP